<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aoife | Executive Tech English Málaga</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap');

        /* CSS Variables for Ultimate Consistency */
        :root {
            --bg-dark: #050508;
            --text-main: #F4F4F5;
            --text-muted: #A1A1AA;
            --accent-cyan: #00F0FF;
            --accent-cyan-dim: rgba(0, 240, 255, 0.15);
            --accent-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        /* Mobile-First Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
            /* Enhanced dynamic background */
            background-image: 
                radial-gradient(circle at 50% -20%, var(--accent-cyan-dim), transparent 60%),
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-attachment: fixed;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 400; margin-bottom: 0.5rem; }
        p { line-height: 1.7; color: var(--text-muted); font-weight: 300; font-size: 1.05rem; }
        
        /* Flashy Gradient Text Utility */
        .text-gradient {
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Mobile Navigation */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 1.5rem; border-bottom: 1px solid var(--glass-border);
            position: fixed; top: 0; width: 100%;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
        }
        .logo { font-size: 1.3rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--text-main);}
        .logo span { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan-dim); }
        
        .nav-controls { display: flex; gap: 1rem; align-items: center; }
        
        .btn-outline {
            background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan);
            padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease;
        }
        .btn-outline:hover { background: var(--accent-cyan); color: var(--bg-dark); box-shadow: 0 0 15px var(--accent-cyan-dim); }
        
        /* High-End Solid Button */
        .btn-solid {
            background: linear-gradient(90deg, var(--accent-cyan), #00b3ff); color: var(--bg-dark); border: none;
            padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
            transition: all 0.3s ease;
        }
        .btn-solid:hover { box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4); transform: translateY(-2px); }
        .btn-solid:active { transform: scale(0.96); }

        /* Main App Container */
        #app { margin-top: 80px; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 4rem; }

        /* Premium Glass Components with Hover Glows */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 12px; padding: 2rem;
            position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .tag { 
            color: var(--accent-gold); font-size: 0.8rem; text-transform: uppercase; 
            letter-spacing: 2px; display: block; margin-bottom: 1rem; font-weight: 500;
        }

        /* Typography sizing for Mobile */
        .hero-title { font-size: 2.5rem; line-height: 1.1; margin-bottom: 1rem; }
        .hero-subtitle { font-size: 1.1rem; margin-bottom: 2rem; }

        /* Pricing Cards */
        .price-card { display: flex; flex-direction: column; height: 100%; border-top: 2px solid var(--glass-border); }
        .price-card.featured { 
            border-top: 3px solid var(--accent-cyan); 
            background: linear-gradient(180deg, rgba(0, 240, 255, 0.05) 0%, transparent 100%);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }
        .price-card.corporate { border-top: 2px solid var(--accent-gold); }
        .price-amount { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 300; color: #fff; margin: 1rem 0; }
        .price-amount span { font-size: 1.2rem; color: var(--text-muted); }
        .price-features { margin-top: 1.5rem; margin-bottom: 2rem; list-style: none; padding: 0; flex-grow: 1;}
        .price-features li { margin-bottom: 1rem; font-size: 0.95rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 0.75rem;}
        .price-features li::before { content: '✦'; color: var(--accent-cyan); font-size: 0.8rem; margin-top: 0.2rem;}
        .corporate .price-features li::before { color: var(--accent-gold); }

        /* Scroll Animations */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ========================================================
           DESKTOP UPGRADES (Min-width 1024px) 
           ======================================================== */
        @media (min-width: 1024px) {
            nav { padding: 1.5rem 5vw; }
            #app { padding: 4rem 5vw; max-width: 1400px; margin: 80px auto 0; gap: 8rem;}
            
            .hero-title { font-size: 4.5rem; max-width: 800px; }
            .hero-subtitle { font-size: 1.25rem; max-width: 600px; }
            
            .desktop-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3rem; align-items: start; }
            .grid-col-left { grid-column: 1 / 6; position: sticky; top: 120px; }
            .grid-col-right { grid-column: 7 / 13; display: flex; flex-direction: column; gap: 2.5rem; }
            
            .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
            
            /* Magnetic Hover Effects for Desktop */
            .glass-panel:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.1);
                border-color: rgba(0, 240, 255, 0.3);
            }
            .corporate.glass-panel:hover {
                border-color: rgba(212, 175, 55, 0.3);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.1);
            }
            .glass-panel { padding: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="navigate('home')">Aoife<span>.</span></div>
        <div class="nav-controls">
            <button class="btn-outline" onclick="toggleLang()" id="langBtn">ES</button>
            <button class="btn-solid" onclick="navigate('programmes')" id="navCta">View Programmes</button>
        </div>
    </nav>

    <main id="app"></main>

    <script>

                                <ul class="price-features">
                                    <li>Dedicated weekly 1-on-1 intensive sessions.</li>
                                    <li>Real-time audits of your actual emails, Slack messages, and slide decks.</li>
                                    <li>Custom vocabulary frameworks for your specific tech niche.</li>
                                    <li>Direct asynchronous feedback.</li>
                                </ul>
                                <button class="btn-solid" style="width: 100%; padding: 1rem;">Apply for Roster</button>
                            </div>

                            <div class="glass-panel price-card corporate">
                                <h3>The Corporate Audit</h3>
                                <p style="font-size: 0.95rem; margin-top: 0.5rem;">For Málaga HR Directors & Team Leads.</p>
                                <div class="price-amount">Custom<span></span></div>
                                <ul class="price-features">
                                    <li>Full assessment of team communication friction.</li>
                                    <li>Small-group workshops focused on Agile/Scrum English efficiency.</li>
                                    <li>Bridging the cultural communication gap with US/UK headquarters.</li>
                                    <li>Monthly progress reporting for HR.</li>
                                </ul>
                                <button class="btn-outline" style="width: 100%; border-color: var(--accent-gold); color: var(--accent-gold); padding: 1rem;">Contact Consultant</button>
                            </div>
                        </div>
                    `
                }
            },
            es: {
                navBtn: "Ver Programas",
                langToggle: "EN",
                pages: {
                    home: `
                        <header class="reveal">
                            <span class="tag">Inglés Ejecutivo para Negocios</span>
                            <h1 class="hero-title text-gradient">Cerramos la brecha entre el talento local y las expectativas globales.</h1>
                            <p class="hero-subtitle">No enseñamos gramática. Forjamos fluidez cognitiva. Especializados en entrenamiento de comunicación de alto nivel para líderes, fundadores y equipos de ingeniería en el hub tecnológico de Málaga.</p>
                            <button class="btn-solid" style="margin-top: 1rem; padding: 1rem 2.5rem; font-size: 1rem;" onclick="navigate('programmes')">Ver Programas de Formación</button>

                        <div class="desktop-grid reveal">
                            <div class="grid-col-left">
                                <span class="tag" style="color: var(--accent-cyan);">El Contexto de Málaga</span>
                                <h2 style="font-size: 2.5rem; line-height: 1.2; margin-bottom: 1rem;">Talento Local.<br>Autoridad Global.</h2>
                                <p>Málaga es la nueva capital tecnológica de Europa. Pero para que los equipos locales lideren iniciativas en empresas como Google, Citi o fondos internacionales, un nivel "intermedio" de inglés es un obstáculo.</p>
                            </div>
                            <div class="grid-col-right">
                                <div class="glass-panel">
                                    <h3 style="font-size: 1.8rem; margin-bottom: 1rem;">Para CTOs y Fundadores</h3>
                                    <p>Domine el ritmo, la convicción y el vocabulario preciso necesarios para asegurar rondas de financiación, dominar las reuniones de directorio y proyectar una autoridad técnica incuestionable en inglés.</p>
                                </div>
                                <div class="glass-panel">
                                    <h3 style="font-size: 1.8rem; margin-bottom: 1rem;">Para Directores de RRHH</h3>
                                    <p>Deje de gastar presupuesto en aplicaciones de idiomas estándar. Realizamos auditorías lingüísticas a sus equipos senior y los capacitamos específicamente para reuniones Agile, comunicación técnica y empatía transfronteriza.</p>

                    programmes: `

                            <span class="tag">Inversión y Arquitectura</span>

                                <h3>Dominio Ejecutivo</h3>
                                <p style="font-size: 0.95rem; margin-top: 0.5rem;">Desarrollo continuo de fluidez cognitiva.</p>
                                <div class="price-amount text-gradient">€500<span>/mes</span></div>
                                <ul class="price-features">
                                    <li>Sesiones intensivas semanales 1-a-1 dedicadas.</li>
                                    <li>Auditorías en tiempo real de sus correos, Slack y presentaciones.</li>
                                    <li>Marcos de vocabulario a medida para su nicho.</li>
                                    <li>Feedback asíncrono directo y continuo.</li>
                                </ul>
                                <button class="btn-solid" style="width: 100%; padding: 1rem;">Solicitar Plaza</button>
                            </div>

                            <div class="glass-panel price-card corporate">
                                <h3>Auditoría Corporativa</h3>
                                <p style="font-size: 0.95rem; margin-top: 0.5rem;">Para RRHH y Team Leads en Málaga.</p>
                                <div class="price-amount">A Medida<span></span></div>
                                <ul class="price-features">
                                    <li>Evaluación completa de la fricción comunicativa del equipo.</li>
                                    <li>Talleres reducidos en inglés eficiente para metodología Agile.</li>
                                    <li>Cierre de la brecha cultural con sedes en EE.UU. / Reino Unido.</li>
                                    <li>Informes mensuales de progreso para RRHH.</li>
                                </ul>
                                <button class="btn-outline" style="width: 100%; border-color: var(--accent-gold); color: var(--accent-gold); padding: 1rem;">Contactar Consultora</button>

                }
            }
        };

        // Application State
        let currentLang = 'en';
        let currentRoute = 'home';

        // Router & Translator Engine
        function navigate(route) {
            currentRoute = route;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            render();
        }

        function render() {
            const data = db[currentLang];
            
            // Update Navigation UI
            document.getElementById('navCta').innerText = data.navBtn;
            document.getElementById('langBtn').innerText = data.langToggle;

            // Inject Page Content
            const app = document.getElementById('app');
            app.innerHTML = data.pages[currentRoute];

            // Re-initialize scroll animations
            setTimeout(initAnimations, 50); 
        }

        // High-End Scroll Animations
        function initAnimations() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { 
                threshold: 0.1, 
                rootMargin: "0px 0px -50px 0px"
            });

            reveals.forEach(element => {
                element.classList.remove('active'); 
                observer.observe(element);
            });
        }

        // Boot the App
        render();
    </script>
</body>
</html>

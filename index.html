<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aoife | Executive English Consultancy Málaga</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

        /* Executive Luxury Variables */
        :root {
            --bg-main: #F8F9FA;
            --bg-surface: #FFFFFF;
            --text-dark: #0F172A;
            --text-muted: #475569;
            --accent-brand: #1E293B; /* Deep Slate */
            --accent-gold: #B4904A;
            --border-light: #E2E8F0;
        }

        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            background-color: var(--bg-main); color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-dark); }
        p { line-height: 1.7; color: var(--text-muted); font-weight: 400; font-size: 1.05rem; }
        
        /* Navigation - Clean & Crisp */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 5vw; border-bottom: 1px solid var(--border-light);
            position: fixed; top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
        }
        .logo { font-size: 1.4rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; color: var(--text-dark);}
        .logo span { color: var(--accent-gold); }
        
        .nav-controls { display: flex; gap: 1rem; align-items: center; }
        
        .btn-outline {
            background: transparent; border: 1px solid var(--border-light); color: var(--text-dark);
            padding: 0.5rem 1.2rem; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 0.85rem; font-weight: 500; transition: all 0.3s ease;
        }
        .btn-outline:hover { border-color: var(--accent-brand); }
        
        .btn-solid {
            background: var(--accent-brand); color: #fff; border: none;
            padding: 0.6rem 1.5rem; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif;
            font-weight: 500; font-size: 0.85rem; transition: background 0.3s ease;
        }
        .btn-solid:hover { background: #000; }

        /* Main App Container */
        #app { margin-top: 80px; padding: 4rem 1.5rem; display: flex; flex-direction: column; gap: 5rem; max-width: 1200px; margin-left: auto; margin-right: auto; }

        /* Surface Cards (Replacing Glass) */
        .surface-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border-light); border-radius: 4px; padding: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .surface-panel:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }
        
        .tag { 
            color: var(--accent-gold); font-size: 0.75rem; text-transform: uppercase; 
            letter-spacing: 1.5px; display: block; margin-bottom: 1.5rem; font-weight: 600; font-family: 'Inter', sans-serif;
        }

        /* Typography */
        .hero-title { font-size: 3rem; line-height: 1.15; margin-bottom: 1.5rem; }
        .hero-subtitle { font-size: 1.15rem; margin-bottom: 2.5rem; max-width: 700px; }

        /* Image Placeholder */
        .profile-image-container {
            width: 100%; height: 300px; background: #E2E8F0; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            margin-bottom: 2rem; font-size: 0.9rem; border: 1px dashed #CBD5E1;
        }

        /* Pricing Cards */
        .price-card { display: flex; flex-direction: column; height: 100%; border-top: 3px solid transparent; }
        .price-card.featured { border-top-color: var(--accent-brand); }
        .price-card.corporate { border-top-color: var(--accent-gold); }
        .price-amount { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--text-dark); margin: 1rem 0; }
        .price-amount span { font-size: 1.2rem; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 300;}
        .price-features { margin-top: 1.5rem; margin-bottom: 2.5rem; list-style: none; padding: 0; flex-grow: 1;}
        .price-features li { margin-bottom: 1rem; font-size: 0.95rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 0.75rem;}
        .price-features li::before { content: '—'; color: var(--accent-gold); font-weight: bold;}

        /* Animations */
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Desktop Grid */
        @media (min-width: 1024px) {
            #app { padding: 6rem 5vw; gap: 8rem; }
            .hero-title { font-size: 4rem; max-width: 800px; }
            .desktop-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4rem; align-items: start; }
            .grid-col-left { grid-column: 1 / 6; position: sticky; top: 120px; }
            .grid-col-right { grid-column: 7 / 13; display: flex; flex-direction: column; gap: 2rem; }
            .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
            .profile-image-container { height: 400px; }
        }
    </style>
</head>
<body>

    <nav>

                        <header class="reveal">

                            <p class="hero-subtitle">Eres un líder senior en español. No deberías sonar como un junior en inglés. Ayudamos a los ejecutivos tech de Málaga a erradicar errores fosilizados y dominar la comunicación de alto nivel, sin la paja de los libros de texto.</p>

                        <div class="desktop-grid reveal">
                            <div class="grid-col-left">

        };

        let currentLang = 'en';
        let currentRoute = 'home';

        function navigate(route) {
            currentRoute = route;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            render();
        }

        function render() {
            const data = db[currentLang];
            document.getElementById('navCta').innerText = data.navBtn;
            document.getElementById('langBtn').innerText = data.langToggle;
            const app = document.getElementById('app');
            app.innerHTML = data.pages[currentRoute];
            setTimeout(initAnimations, 50); 
        }

        function initAnimations() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -20px 0px" });

            reveals.forEach(element => {
                element.classList.remove('active'); 
                observer.observe(element);
            });
        }

        render();
    </script>
</body>
</html>
